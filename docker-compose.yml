version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ats_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ats_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ats_analyzer
      - JWT_SECRET=ats_secret_key_123_prod
      - NODE_ENV=production
      # - GEMINI_API_KEY=your_gemini_api_key
      # - PINECONE_API_KEY=your_pinecone_api_key
    depends_on:
      - mongodb
    networks:
      - ats_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ats_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - ats_network

volumes:
  mongo_data:

networks:
  ats_network:
    driver: bridge
